<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CalcMate</title>
    <link rel="stylesheet" href="calculator.css">
</head>
<body>
    <section class = "header">
        <a href="#" class="logo">
            <span>📱</span>
            <span><h1>CalcMate</h1></span>
        </a>
    </section>
    <div class="calculator-display">
        <div class="calculator-operator" id="operator"></div>
        <div class="calculator-value" id="display">0</div>
      </div>
      <div class="calculator-keypad">
            <button class="calculator-btn-secondary" onclick="handleClear()">AC</button>
            <button class="calculator-btn-default" onclick="handleNumber('7')">7</button>
            <button class="calculator-btn-default" onclick="handleNumber('8')">8</button>
            <button class="calculator-btn-default" onclick="handleNumber('9')">9</button>
            <button class="calculator-btn-operator" onclick="handleOperator('/')">/</button>

            <button class="calculator-btn-default" onclick="handleNumber('4')">4</button>
            <button class="calculator-btn-default" onclick="handleNumber('5')">5</button>
            <button class="calculator-btn-default" onclick="handleNumber('6')">6</button>
            <button class="calculator-btn-operator" onclick="handleOperator('*')">*</button>

            <button class="calculator-btn-default" onclick="handleNumber('1')">1</button>
            <button class="calculator-btn-default" onclick="handleNumber('2')">2</button>
            <button class="calculator-btn-default" onclick="handleNumber('3')">3</button>
            <button class="calculator-btn-operator" onclick="handleOperator('-')">-</button>

            <button class="calculator-btn-default" onclick="handleNumber('0')">0</button>
            <button class="calculator-btn-default" onclick="handleDecimal()">.</button>
            <button class="calculator-btn-operator" onclick="calculate()">=</button>
            <button class="calculator-btn-operator" onclick="handleOperator('+')">+</button>
        </div>

    </section>
    <script src="calculator.js"></script>
</body>
</html>
